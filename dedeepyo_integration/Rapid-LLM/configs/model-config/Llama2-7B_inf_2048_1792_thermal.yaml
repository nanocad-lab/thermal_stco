model_param:
  mode: "LLM"
  run_type: "inference"
  tied_embeddings: true
  model_type: "llama"
  global_batch_size: 32
  gradient_accumulation_steps: 1
  seq_len: 4096
  decode_len: 256
  hidden_dim: 4096
  attention:
    attention_type: "mha"
    num_heads: 32
    kv_heads: null
    use_flashattention: true
    attention_tile_size: 128
  moe:
    num_experts: 1
    top_k: 1
    moe_intermediate_size: 0
    n_shared_experts: 0
    moe_layer_freq: 0
    first_k_dense_replace: 0
  intermediate_size: 11008
  vocab_size: 32000
  num_layers: 32

inference_param:
  sample_every: -1
