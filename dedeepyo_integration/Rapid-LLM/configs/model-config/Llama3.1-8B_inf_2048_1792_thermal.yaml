model_param:
  mode: "LLM"
  run_type: "inference"
  tied_embeddings: true
  model_type: "llama"
  # Standardized inference baseline across thermal model variants.
  global_batch_size: 32
  gradient_accumulation_steps: 1
  seq_len: 4096
  decode_len: 256
  # Llama3.1-8B shape.
  hidden_dim: 4096
  attention:
    attention_type: "gqa"
    num_heads: 32
    kv_heads: 8
    use_flashattention: true
    attention_tile_size: 128
  moe:
    num_experts: 1
    top_k: 1
    moe_intermediate_size: 14336
    n_shared_experts: 0
    moe_layer_freq: 1
    first_k_dense_replace: 32
  intermediate_size: 14336
  vocab_size: 128256
  num_layers: 32
