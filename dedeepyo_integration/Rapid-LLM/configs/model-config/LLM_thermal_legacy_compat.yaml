model_param:
    mode: "LLM"
    run_type: "training"
    tied_embeddings: false
    model_type: "llama"
    global_batch_size: 16
    gradient_accumulation_steps: 1
    seq_len: 2048
    decode_len: 0
    hidden_dim: 4096
    attention:
        attention_type: "mha"
        num_heads: 32
        kv_heads: 32
        use_flashattention: false
        attention_tile_size: 256
    moe:
      num_experts: 1
      top_k: 1
      moe_intermediate_size: 11008
      n_shared_experts: 0
      moe_layer_freq: 1
      first_k_dense_replace: 1
    intermediate_size: 11008
    vocab_size: 32000
    num_layers: 32
