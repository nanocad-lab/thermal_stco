sw_param:
  full_recomputation: false
  kernel_launch_overhead: 9e-6
  dp_zero_stage: 2
  precision:
    tensor_format: 2.0
    kv_cache: 1.0
    parameters: as_tensor_format
    gradients: as_tensor_format
    grad_communication: as_tensor_format
    optimizer_states: as_tensor_format
    stats: as_tensor_format
    master_parameters: 0.0
  h2d_bandwidth: 13297674240
  const_mem_offset: 0 GB
  dp_microbatch: last_mb

tech_param:
  core:
    operating_frequency: 1.41e9
    num_bundles: 108
    nominal_flop_rate_per_mcu: 512
    nominal_energy_per_flop: 1.8e-13
    num_mcu_per_bundle: 4
    FMA_d1: 8
    FMA_d2: 4
    dataflow: best
    util: 1
  DRAM:
    size: 80 GB
    bandwidth: 1986 GB
    dynamic_energy_per_bit: 4.5e-12
    latency: 100.0e-9
    util: 1
  SRAM-L2:
    size: 40 MB
    bandwidth: 7050 GB
    dynamic_energy_per_bit: 130e-15
    latency: 0
    util: 1
  SRAM-L1:
    size: 20736 KB
    bandwidth: 18432 GB
    dynamic_energy_per_bit: 130e-15
    latency: 0
    util: 1
  SRAM-R:
    size: 27 MB
    bandwidth: 124928 GB
    dynamic_energy_per_bit: 110e-15
    latency: 0
    util: 1

memory_hierarchy:
  l0:
    type: SRAM-R
    scope: mcu
  l1:
    type: SRAM-L1
    scope: mcu-bundle
  l2:
    type: SRAM-L2
    scope: global
  l3:
    type: DRAM
    scope: global

parallelism:
  pp: 1
  mb: 1
  tp: 1
  tp_sp: false
  cp: 1
  train:
    dp: 1
    ep: 1
    tp_ep: true
  inference:
    replica_count: 1
    moe_dp: 1

network:
  dimensions:
    - id: dim0
      label: device_fabric
      size: 1
      topology:
        type: Ring
        bandwidth: 400 Gb
        latency: 5e-6
        energy_per_bit: 8e-12
        util: 1.0
      collective_override: {}
      parallelisms: [tp, cp, ep, pp, dp]
  overlap:
    tp_sp_overlap: 0.63
    tp_overlap: 0.6
    cp_overlap: 0.0

execution_backend:
  model: analytical
  astra:
    backend: astra
    mode: hybrid
    collectives:
      all_gather: auto
      all_reduce: auto
      reduce_scatter: auto
      all_to_all: auto
    sys_options:
      endpoint_delay: 10
      active_chunks_per_dimension: 32
      preferred_dataset_splits: 32

inference:
  kvcache_type: hbm_only
